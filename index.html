<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 60px;
            padding: 40px 20px;
            background-color: #fff;
            border: 1px solid #d1c4b0;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: linear-gradient(90deg, #1565c0, #64b5f6, #1565c0);
        }
        
        .header h1 {
            font-size: 3em;
            color: #5d4037;
            margin-bottom: 10px;
            font-weight: normal;
            letter-spacing: 3px;
        }
        
        .header .subtitle {
            font-size: 1.3em;
            color: #8d6e63;
            font-style: italic;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 40px;
        }
        
        .card {
            background-color: #fff;
            border: 1px solid #d1c4b0;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 40px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #1565c0, #64b5f6, #1565c0);
        }
        
        .card-icon {
            font-size: 4em;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .card h2 {
            font-size: 2em;
            color: #5d4037;
            margin-bottom: 15px;
            text-align: center;
            font-weight: normal;
            border-bottom: 2px solid #d1c4b0;
            padding-bottom: 15px;
        }
        
        .card p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.8;
            text-align: center;
        }
        
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 25px;
            justify-content: center;
        }
        
        .tag {
            background-color: #f5f0e6;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            color: #5d4037;
            border: 1px solid #d1c4b0;
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: #8d6e63;
            font-size: 0.9em;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>钟心果的个人网站</h1>
            <div class="subtitle">探索Python编程的奇妙世界</div>
        </div>
        
        <div class="card-grid">
            <a href="resume.html" class="card">
                <div class="card-icon">📄</div>
                <h2>个人简历</h2>
                <p>查看我的个人简历，了解我的教育背景、专业技能和实践经历</p>
                <div class="card-tags">
                    <span class="tag">教育背景</span>
                    <span class="tag">专业技能</span>
                    <span class="tag">实践经历</span>
                </div>
            </a>
            
            <a href="python-course.html" class="card">
                <div class="card-icon">🐍</div>
                <h2>Python 基础课程</h2>
                <p>从零开始学习 Python 编程，掌握编程基础，开启数据分析之旅</p>
                <div class="card-tags">
                    <span class="tag">编程入门</span>
                    <span class="tag">Python</span>
                    <span class="tag">数据分析</span>
                </div>
            </a>
        </div>
        
        <div class="footer">
            <p>© 2026 我的个人网站 | 现代复古风格</p>
        </div>
    </div>
</body>
</html>
